$font = JetBrainsMono Nerd Font

general {
    hide_cursor = false
}

background {
    monitor =
    path = /home/horizon/.config/hypr/current_wallpaper.png
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
}

label {
    monitor =
    text = cmd[update:1000] ~/.config/hypr/scripts/song_status.sh
    color = rgb(e4e1e9)
    font_size = 30
    font_family = $font
    position = 0, -50
    halign = center
    valign = top
}

label {
    monitor =
    text = <span font_weight="ultrabold">$TIME</span>
    color = rgb(bec2ff)
    font_size = 150
    font_family = $font

    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:43200000] date +"%A, %d %B"
    color = rgb(bec2ff)
    font_size = 40
    font_family = $font
    position = 0, 120
    halign = center
    valign = center
}

image {
    monitor =
    path = /home/horizon/.config/hypr/avatar.jpg
    size = 200
    rounding = -1
    border_size = 3
    border_color = rgb(bec2ff)
    position = 0, -60
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 350, 90
    outline_thickness = 5
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb(bec2ff) rgb(c5c4dd) 45deg
    inner_color = rgba(1f1f25b3)
    font_color = rgb(e4e1e9)
    fade_on_empty = false
    font_family = $font
    placeholder_text = <i><span foreground="##91909a">Enter Password</span></i>
    hide_input = false

    fail_color = rgb(ffb4ab) rgb(93000a) 40deg
    fail_text = <i>$PAMFAIL</i>

    position = 0, -250
    halign = center
    valign = center
}

label {
    monitor =
    text = $LAYOUT[en,ru]
    color = rgb(c7c5d0)
    font_size = 25
    position = 0, -340
    halign = center
    valign = center
}
