animations {
    enabled = true

    bezier = overshot, 0.05, 0.9, 0.1, 1.2
    bezier = overshot_workspace, 0.1, 1.25, 0.2, 1.15
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1

    animation = windows, 1, 5, overshot, popin 20%
    animation = windowsOut, 1, 3, smoothOut, slidefade 20%
    animation = windowsMove, 1, 4, overshot
    animation = border, 1, 10, default
    animation = fade, 1, 10, smoothIn
    animation = fadeDim, 1, 10, smoothIn
    animation = workspaces, 1, 6, overshot_workspace, slide

#for rofi and wlogout
    animation = layers, 1, 4, overshot, popin 0%
    animation = layersOut, 1, 3, smoothOut, popin 0%
}




# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
