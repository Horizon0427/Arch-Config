[Settings]
language = en
folder = ~/Pictures/wallpapers
monitors = All
wallpaper = ~/Pictures/wallpapers/stoneforest.jpg
show_path_in_tooltip = True
backend = swww
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = ln -sf "$wallpaper" /home/horizon/.config/hypr/current_wallpaper.png; pkill waybar; matugen image "$wallpaper" --source-color-index 0; hyprctl reload; swaync-client -rs; sleep 0.5; waybar &
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 1
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = /home/horizon/.config/waypaper/style.css

